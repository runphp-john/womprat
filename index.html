<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Womprat</title>
<style>
  html, body { margin: 0; padding: 0; background: #0b2545; overflow: hidden; height: 100%; font-family: "Courier New", monospace; color: #bfe0ff; }
  #hud {
    position: fixed; top: 0; left: 0; right: 0; padding: 12px 18px;
    display: flex; justify-content: space-between; pointer-events: none;
    text-shadow: 0 0 6px #bfe0ff; font-size: 16px; letter-spacing: 2px;
    z-index: 10;
  }
  #hud #combo { color: #ffd166; text-shadow: 0 0 8px #ffd166; letter-spacing: 1px; }
  #hud .bar {
    display: inline-block; width: 110px; height: 12px; margin-left: 6px;
    border: 1px solid #bfe0ff; vertical-align: middle; box-shadow: 0 0 6px rgba(143,182,230,0.4);
  }
  #hud .bar > i { display: block; height: 100%; width: 100%; background: #bfe0ff; transition: width .12s linear; }
  /* boss vignette - clear in the centre (where the megas are), darkens the busy walls */
  #bossdim {
    position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0;
    transition: opacity 0.7s ease;
    background: radial-gradient(ellipse 72% 66% at 50% 42%, rgba(7,24,47,0) 35%, rgba(7,24,47,0.83) 100%);
  }
  #dmgflash {
    position: fixed; inset: 0; pointer-events: none; z-index: 8; opacity: 0;
    border: 5px solid rgba(255, 50, 50, 0.95);
    box-shadow: inset 0 0 22px 3px rgba(255, 45, 45, 0.55);
    transition: opacity .1s linear;
  }
  #center {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; pointer-events: none; z-index: 10;
    text-shadow: 0 0 8px #bfe0ff;
    background: rgba(0, 0, 0, 0.8);
    padding: 30px 56px 22px;
    border-radius: 12px;
    border: 1px solid rgba(150, 200, 255, 0.25);
    box-shadow: 0 0 32px rgba(0, 0, 0, 0.55);
  }
  #center h1 { font-size: 42px; margin: 0 0 12px; letter-spacing: 8px; }
  #center p { margin: 4px 0; font-size: 14px; letter-spacing: 2px; }
  #center .controls { display: inline-block; text-align: left; margin: 8px 0 2px; }
  #center .controls p { display: grid; grid-template-columns: 140px 1fr; gap: 12px; margin: 5px 0; white-space: nowrap; }
  #center .controls p span:first-child { color: #bfe0ff; }
  #center .controls p span:last-child { opacity: 0.82; }
  #center input {
    pointer-events: auto; font-family: inherit; font-size: 18px; letter-spacing: 5px;
    text-align: center; text-transform: uppercase; color: #bfe0ff; caret-color: #bfe0ff;
    background: rgba(0, 24, 48, 0.85); border: 1px solid #bfe0ff; border-radius: 4px;
    padding: 6px 8px; width: 170px; margin: 6px 0 4px; outline: none;
  }
  #center .lb { margin-top: 12px; display: inline-block; min-width: 220px; font-size: 13px; letter-spacing: 1px; }
  #center .lb .row { display: flex; justify-content: space-between; gap: 26px; padding: 1px 0; opacity: 0.8; }
  #center .lb .row.me { color: #ffd166; opacity: 1; text-shadow: 0 0 8px #ffd166; }
  #center .credit {
    margin-top: 18px; padding-top: 14px; border-top: 1px solid rgba(150,200,255,0.18);
    display: flex; align-items: center; justify-content: center; gap: 11px;
  }
  #center .credit img { width: 46px; height: 46px; border-radius: 50%; border: 1px solid rgba(150,200,255,0.5); }
  #center .credit span { font-size: 13px; letter-spacing: 3px; opacity: 0.9; }
  #center .blink { animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.4; } }
  /* primary call to action - the most important prompt on the title screen */
  #center .cta { font-size: 18px; letter-spacing: 4px; color: #eaf4ff; text-shadow: 0 0 16px #bfe0ff; margin: 26px 0 6px; }
  /* low-shield pulse - stays blue (just breathes) so it never reads as a colour change */
  @keyframes shieldlow { 50% { opacity: 0.35; } }
  #hud .bar.low > i { animation: shieldlow 0.5s infinite; }
  /* boss health readout */
  #boss, #boba {
    position: fixed; top: 46px; left: 50%; transform: translateX(-50%);
    text-align: center; z-index: 9; pointer-events: none; text-shadow: 0 0 8px #ff6655;
  }
  #boss .btitle, #boba .btitle { color: #ff8c70; font-size: 13px; letter-spacing: 5px; margin-bottom: 5px; }
  #boss .brow, #boba .brow { display: flex; gap: 14px; justify-content: center; }
  #boss .bbar, #boba .bbar { display: inline-block; width: 132px; height: 9px; border: 1px solid #ff8c70; box-shadow: 0 0 7px rgba(255,90,70,0.5); }
  #boss .bbar > i, #boba .bbar > i { display: block; height: 100%; width: 100%; background: #ff5a46; transition: width .1s linear; }
  #boba .bbar.wide { width: 280px; }
  /* centre announcements (boss start / cleared) */
  #banner {
    position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
    z-index: 11; pointer-events: none; opacity: 0; transition: opacity .4s ease;
    font-size: 34px; letter-spacing: 7px; color: #ffd0c0; text-shadow: 0 0 16px #ff5a46;
  }
  .hidden { display: none !important; }
  .crosshair {
    position: fixed; top: 50%; left: 50%; width: 44px; height: 44px;
    transform: translate(-50%, -50%); pointer-events: none; z-index: 5;
    border: 1px solid #bfe0ff; border-radius: 50%; opacity: .55;
    box-shadow: 0 0 8px #bfe0ff inset;
    transition: border-color .15s, box-shadow .15s, width .15s, height .15s;
  }
  .crosshair.locked {
    border-color: #ff4444; box-shadow: 0 0 12px #ff4444 inset, 0 0 14px #ff4444;
    width: 56px; height: 56px;
  }
  .crosshair::before, .crosshair::after { content: ""; position: absolute; background: currentColor; }
  .crosshair { color: #bfe0ff; }
  .crosshair.locked { color: #ff4444; }
  .crosshair::before { left: 50%; top: -10px; bottom: -10px; width: 1px; margin-left: -.5px; background: #bfe0ff; }
  .crosshair::after { top: 50%; left: -10px; right: -10px; height: 1px; margin-top: -.5px; background: #bfe0ff; }
  .crosshair.locked::before, .crosshair.locked::after { background: #ff4444; }
</style>
</head>

<script type="module">
import * as THREE from "three";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { ShaderPass } from "three/addons/postprocessing/ShaderPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";
import { mergeGeometries } from "three/addons/utils/BufferGeometryUtils.js";

// stylised game: disable colour management so the palette renders EXACTLY as authored
// (otherwise the final sRGB encode brightens the dark navy into a washed-out steel blue)
THREE.ColorManagement.enabled = false;

// ---------- core ----------
const scene = new THREE.Scene();
const BLUEPRINT_BG = 0x07182f;          // deep saturated blueprint navy
scene.background = new THREE.Color(BLUEPRINT_BG);
scene.fog = new THREE.Fog(BLUEPRINT_BG, 100, 340);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;   // no extra gamma encode - palette is final
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const BASE_FOV = 72;
const camera = new THREE.PerspectiveCamera(BASE_FOV, window.innerWidth / window.innerHeight, 0.1, 1100);
camera.position.set(0, 3.0, 9);

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- 16-colour palette quantization post-pass ----------
// 12 blues (dark to bright) + 2 reds (laser/explosion) + 2 whites (ink/highlights)
const PALETTE = [
  // blues - palette[0] matches the background so empty space maps to itself
  new THREE.Vector3(  7/255,  24/255,  47/255),
  new THREE.Vector3( 11/255,  34/255,  64/255),
  new THREE.Vector3( 16/255,  46/255,  84/255),
  new THREE.Vector3( 22/255,  60/255, 104/255),
  new THREE.Vector3( 30/255,  76/255, 126/255),

const palettePass = new ShaderPass({
  uniforms: {

    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec3 uPalette[18];
    varying vec2 vUv;
    void main() {
      vec3 c = texture2D(tDiffuse, vUv).rgb;
      vec3 best = uPalette[0];
      float bestD = distance(c, uPalette[0]);
      for (int i = 1; i < 18; i++) {
        float d = distance(c, uPalette[i]);
        if (d < bestD) { bestD = d; best = uPalette[i]; }
      }
      gl_FragColor = vec4(best, 1.0);
    }
  `,
});

// ---------- audio: Web Audio synthesis (no external/copyright assets) ----------
// Evokes the originals: blasters = downward "twang" sweep (Ben Burtt's radio-tower
// guy-wire), TIE = wailing vibrato scream, explosions = filtered noise + low boom,
// X-wing = filtered jet-engine hum that opens up on boost.
let actx = null, masterGain = null, engine = null, audioOn = true, music = null;
function initAudio() {
  if (actx) return;
  try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  masterGain = actx.createGain();
  masterGain.gain.value = 0.45;
  masterGain.connect(actx.destination);
}
function resumeAudio() { if (actx && actx.state === "suspended") actx.resume(); }
function noiseBuffer(dur) {
  const n = Math.max(1, Math.floor(actx.sampleRate * dur));
  const buf = actx.createBuffer(1, n, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}
// downward "twang" - the blaster family
function sfxBlaster(f0, f1, dur, vol, type) {
  if (!actx || !audioOn) return;
  const t = actx.currentTime;
  const o = actx.createOscillator();
  o.type = type || "square";
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(f1, t + dur);
  const flt = actx.createBiquadFilter();
  flt.type = "bandpass"; flt.frequency.value = f0 * 0.6; flt.Q.value = 6;   // metallic ring
  const g = actx.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(flt); flt.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + dur + 0.02);
}
const sfxPlayerLaser = () => sfxBlaster(1500, 240, 0.14, 0.16, "square");
const sfxTurretLaser = () => sfxBlaster(820, 150, 0.22, 0.10, "sawtooth");
const sfxTieLaser    = () => sfxBlaster(2000, 360, 0.12, 0.10, "square");
function sfxExplosion(big) {
  if (!actx || !audioOn) return;
  const t = actx.currentTime, dur = big ? 0.85 : 0.42;
  const src = actx.createBufferSource(); src.buffer = noiseBuffer(dur);
  const flt = actx.createBiquadFilter(); flt.type = "lowpass";
  flt.frequency.setValueAtTime(big ? 2000 : 1300, t);
  flt.frequency.exponentialRampToValueAtTime(110, t + dur);
  const g = actx.createGain();
  g.gain.setValueAtTime(big ? 0.5 : 0.32, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.connect(flt); flt.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + dur);
  const o = actx.createOscillator(), og = actx.createGain();
  o.type = "sine"; o.frequency.setValueAtTime(big ? 95 : 130, t);
  o.frequency.exponentialRampToValueAtTime(40, t + dur);
  og.gain.setValueAtTime(big ? 0.5 : 0.28, t);

}
function sfxTieScream() {

  const lfo = actx.createOscillator(); lfo.frequency.value = 16;
  const lfoG = actx.createGain(); lfoG.gain.value = 70;
  lfo.connect(lfoG); lfoG.connect(o.frequency);                 // vibrato wail
  const flt = actx.createBiquadFilter(); flt.type = "bandpass"; flt.frequency.value = 1300; flt.Q.value = 5;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.09, t + 0.12);
  g.gain.linearRampToValueAtTime(0.0001, t + dur);
  o.connect(flt); flt.connect(g); g.connect(masterGain);
  o.start(t); lfo.start(t); o.stop(t + dur); lfo.stop(t + dur);

// ---------- music bed: a slow, ominous synth pulse (tenser during bosses) ----------
function playMusicNote(time, freq, dur, type, vol) {
  if (!music) return;
  const o = actx.createOscillator(); o.type = type; o.frequency.value = freq;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, time);
  g.gain.exponentialRampToValueAtTime(vol, time + 0.03);
  g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
  o.connect(g); g.connect(music.bus);
  o.start(time); o.stop(time + dur + 0.03);
}
function startMusic() {
  if (!actx || music) return;
  const bus = actx.createGain(); bus.gain.value = 0.0; bus.connect(masterGain);
  bus.gain.linearRampToValueAtTime(0.42, actx.currentTime + 2.0);   // gentle fade-in
  music = { bus, nextNoteTime: actx.currentTime + 0.15, step: 0 };
}
function stopMusic() {
  if (!music) return;
  const m = music; music = null;
  try {
    m.bus.gain.cancelScheduledValues(actx.currentTime);
    m.bus.gain.setValueAtTime(m.bus.gain.value, actx.currentTime);
    m.bus.gain.linearRampToValueAtTime(0.0001, actx.currentTime + 0.7);
  } catch (e) {}
}
const MUSIC_ROOTS = [55, 55, 43.65, 49];   // A1, A1, F1, G1 - a brooding minor cycle
function updateMusic() {
  if (!music || !actx) return;
  const ahead = actx.currentTime + 0.25;
  const boss = state.bossActive || state.bobaActive;
  const tempo = boss ? 0.24 : 0.36;         // seconds per step (faster = tenser during bosses)
  while (music.nextNoteTime < ahead) {
    const s = music.step % 16;
    const root = MUSIC_ROOTS[Math.floor(s / 4)];
    playMusicNote(music.nextNoteTime, root, tempo * 0.9, "triangle", boss ? 0.42 : 0.3);   // bass pulse
    if (s % 2 === 0) playMusicNote(music.nextNoteTime, root / 2, tempo * 1.5, "sine", 0.26); // sub
    if (s === 0 || s === 6 || s === 10) playMusicNote(music.nextNoteTime, root * 3, tempo * 1.1, "sawtooth", boss ? 0.1 : 0.05); // accent
    if (boss && s % 4 === 0) playMusicNote(music.nextNoteTime, root * 1.5, tempo * 2.2, "sine", 0.09); // tension drone
    music.nextNoteTime += tempo;
    music.step++;
  }
}
function sfxPickup() {
  if (!actx || !audioOn) return;
  const t = actx.currentTime;
  [880, 1320].forEach((f, i) => {
    const o = actx.createOscillator(); o.type = "triangle"; o.frequency.value = f;
    const g = actx.createGain();
    g.gain.setValueAtTime(0.0001, t + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.12, t + i * 0.08 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.08 + 0.2);
    o.connect(g); g.connect(masterGain);
    o.start(t + i * 0.08); o.stop(t + i * 0.08 + 0.22);
  });
}
function startEngine() {
  if (!actx || engine) return;
  const t = actx.currentTime;
  // rushing-air rumble: looping noise through a slowly "breathing" low-pass
  const src = actx.createBufferSource();
  src.buffer = noiseBuffer(3.0); src.loop = true;
  const flt = actx.createBiquadFilter(); flt.type = "lowpass";
  flt.frequency.value = 240; flt.Q.value = 6;
  // slow breathing sweep of the cutoff so the timbre never sits still
  const lfo = actx.createOscillator(); lfo.type = "sine"; lfo.frequency.value = 0.23;
  const lfoG = actx.createGain(); lfoG.gain.value = 95;
  lfo.connect(lfoG); lfoG.connect(flt.frequency);
  // faster, shallow turbulence flutter layered on top
  const lfo2 = actx.createOscillator(); lfo2.type = "sine"; lfo2.frequency.value = 2.7;
  const lfo2G = actx.createGain(); lfo2G.gain.value = 30;
  lfo2.connect(lfo2G); lfo2G.connect(flt.frequency);
  // quiet sub for weight, with a slow pitch drift
  const sub = actx.createOscillator(); sub.type = "sine"; sub.frequency.value = 48;
  const subG = actx.createGain(); subG.gain.value = 0.45;
  const subLfo = actx.createOscillator(); subLfo.type = "sine"; subLfo.frequency.value = 0.17;
  const subLfoG = actx.createGain(); subLfoG.gain.value = 6;
  subLfo.connect(subLfoG); subLfoG.connect(sub.frequency);
  sub.connect(subG);
  const g = actx.createGain(); g.gain.value = 0.0;
  src.connect(flt); flt.connect(g); subG.connect(g); g.connect(masterGain);
  src.start(); sub.start(); lfo.start(); lfo2.start(); subLfo.start();
  g.gain.linearRampToValueAtTime(0.04, t + 0.6);
  engine = { src, sub, flt, g, lfo, lfo2, subLfo };
}
function setEngineBoost(boost) {
  if (!engine || !actx) return;
  const t = actx.currentTime;
  engine.flt.frequency.cancelScheduledValues(t);
  engine.flt.frequency.linearRampToValueAtTime(boost ? 480 : 240, t + 0.18);
  engine.g.gain.linearRampToValueAtTime(boost ? 0.065 : 0.04, t + 0.18);
}
// short harsh grind for scraping the trench wall
function sfxScrape() {

// R2-D2 astromech chirps - a quick run of sliding beeps
function sfxR2Bleep() {

function sfxR2Sad() {

// a "part" = shaded solid fill + bright wireframe edges on top
function edges(geom, mat = wireMat) {
  const grp = new THREE.Group();
  grp.add(new THREE.Mesh(geom, fillMat));
  grp.add(new THREE.LineSegments(new THREE.EdgesGeometry(geom), mat));
  return grp;
}

// wireframe only (no fill) - for flat decals etched on a surface
function wire(geom, mat = wireMat) {
  return new THREE.LineSegments(new THREE.EdgesGeometry(geom), mat);
}

// ---------- trench ----------
const TRENCH_W = 16;
const TRENCH_H = 14;
const SEG_LEN = 22;
const SEG_COUNT = 28;
const trenchSegments = [];

// a Death Star surface "tile": a raised rectangular panel with stepped sub-panels,
// ridge rows and recessed channel lines - structured industrial plating, not random scatter
function addTilePanel(g, side, y, z, cellH, cellW) {
  const inward = -side;                       // extrude toward trench centre
  const wallX = side * (TRENCH_W / 2 - 0.02);
  const baseDepth = 0.22 + Math.random() * 0.45;
  const w = cellW * (0.74 + Math.random() * 0.2);   // along Z
  const h = cellH * (0.74 + Math.random() * 0.2);   // along Y
  const panel = new THREE.Group();

  // base slab raised from the wall
  panel.add(edges(new THREE.BoxGeometry(baseDepth, h, w), wireMat));

  // stepped sub-panels on the face
  const subs = 1 + Math.floor(Math.random() * 3);
  for (let i = 0; i < subs; i++) {
    const sw = w * (0.22 + Math.random() * 0.4);
    const sh = h * (0.22 + Math.random() * 0.45);
    const sd = baseDepth + 0.12 + Math.random() * 0.3;
    const b = edges(new THREE.BoxGeometry(sd, sh, sw), wireMat);
    b.position.set(inward * (sd - baseDepth) / 2,
      (Math.random() - 0.5) * (h - sh) * 0.8,
      (Math.random() - 0.5) * (w - sw) * 0.8);
    panel.add(b);
  }

  // a row of ridge teeth along one edge
  if (Math.random() < 0.5) {
    const teeth = 3 + Math.floor(Math.random() * 3);
    const tw = (w * 0.82) / teeth;
    for (let i = 0; i < teeth; i++) {
      const t = edges(new THREE.BoxGeometry(baseDepth + 0.16, h * 0.16, tw * 0.6), wireMat);
      t.position.set(inward * baseDepth * 0.5, -h / 2 + h * 0.12, -w * 0.41 + (i + 0.5) * tw);
      panel.add(t);
    }
  }

  // recessed channel line etched across the face
  if (Math.random() < 0.5) {
    const ch = wire(new THREE.PlaneGeometry(w * 0.9, h * 0.1), dimMat);
    ch.rotation.y = side > 0 ? -Math.PI / 2 : Math.PI / 2;
    ch.position.set(inward * (baseDepth + 0.01), (Math.random() - 0.5) * h * 0.5, 0);
    panel.add(ch);
  }

  panel.position.set(wallX + inward * baseDepth / 2, y, z);
  g.add(panel);
}

// lay tiles in a structured grid across a wall (Death Star plating)
function addWallTiles(g, side) {
  const cols = 3, rows = 3;
  const cellW = (SEG_LEN - 1) / cols;
  const cellH = (TRENCH_H - 2.5) / rows;
  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < rows; r++) {
      if (Math.random() < 0.15) continue;     // occasional gap in the plating
      const z = -SEG_LEN / 2 + (c + 0.5) * cellW + (Math.random() - 0.5) * cellW * 0.18;
      const y = -TRENCH_H / 2 + 1.2 + (r + 0.5) * cellH + (Math.random() - 0.5) * cellH * 0.18;
      addTilePanel(g, side, y, z, cellH, cellW);
    }
  }
}

function makeTrenchSegment() {
  const g = new THREE.Group();

  // walls (open to space at the top - NO ceiling)
  const wallGeo = new THREE.PlaneGeometry(SEG_LEN, TRENCH_H, 9, 6);
  const left = edges(wallGeo, dimMat);
  left.rotation.y = Math.PI / 2;
  left.position.x = -TRENCH_W / 2;
  g.add(left);

  const right = edges(wallGeo, dimMat);
  right.rotation.y = -Math.PI / 2;
  right.position.x = TRENCH_W / 2;
  g.add(right);

  // top edge rails - the lip of the trench where it meets open space
  for (const side of [-1, 1]) {
    const lip = edges(new THREE.BoxGeometry(0.5, 0.5, SEG_LEN), wireMat);
    lip.position.set(side * (TRENCH_W / 2), TRENCH_H / 2, 0);
    g.add(lip);
  }

  // floor grid
  const floorGeo = new THREE.PlaneGeometry(TRENCH_W, SEG_LEN, 5, 8);
  const floor = edges(floorGeo, dimMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -TRENCH_H / 2;
  g.add(floor);

  // central floor spine + side rails (the iconic trench channel)
  const spine = edges(new THREE.BoxGeometry(2.4, 0.55, SEG_LEN), wireMat);
  spine.position.set(0, -TRENCH_H / 2 + 0.27, 0);
  g.add(spine);
  for (const rx of [-1.7, 1.7]) {
    const rail = edges(new THREE.BoxGeometry(0.35, 0.3, SEG_LEN), dimMat);
    rail.position.set(rx, -TRENCH_H / 2 + 0.15, 0);
    g.add(rail);
  }

  // structured Death Star tile plating on both walls
  addWallTiles(g, -1);
  addWallTiles(g, 1);

  // horizontal pipes running along each wall
  for (const side of [-1, 1]) {
    const pipeCount = 1 + Math.floor(Math.random() * 2);
    for (let p = 0; p < pipeCount; p++) {
      const pipe = edges(new THREE.CylinderGeometry(0.12, 0.12, SEG_LEN, 6), wireMat);
      pipe.rotation.x = Math.PI / 2;
      pipe.position.set(side * (TRENCH_W / 2 - 0.35), -TRENCH_H / 2 + 1.5 + Math.random() * (TRENCH_H - 3), 0);
      g.add(pipe);
    }
  }

  // ---- floor detailing: Death Star deck plating ----
  const fy = -TRENCH_H / 2;
  // transverse ribs across the whole floor
  for (let i = 0; i < 7; i++) {
    const rib = edges(new THREE.BoxGeometry(TRENCH_W - 0.6, 0.14, 0.35), dimMat);
    rib.position.set(0, fy + 0.07, -SEG_LEN / 2 + (i + 0.5) * (SEG_LEN / 7));
    g.add(rib);
  }
  // pipes running alongside the central spine
  for (const sx of [-2.3, 2.3]) {
    const fp = edges(new THREE.CylinderGeometry(0.1, 0.1, SEG_LEN, 6), dimMat);
    fp.rotation.x = Math.PI / 2;
    fp.position.set(sx, fy + 0.1, 0);
    g.add(fp);
  }
  // raised rectangular deck panels either side of the spine (varying depth)
  for (const sx of [-1, 1]) {
    for (let i = 0; i < 4; i++) {
      const w = 1.3 + Math.random() * 1.9;
      const d = 1.8 + Math.random() * 2.8;
      const h = 0.18 + Math.random() * 0.5;
      const p = edges(new THREE.BoxGeometry(w, h, d), wireMat);
      p.position.set(sx * (2.9 + Math.random() * 3.6), fy + h / 2, (Math.random() - 0.5) * (SEG_LEN - 3));
      g.add(p);
    }
  }
  // scattered small deck boxes / vents
  for (let i = 0; i < 5; i++) {
    const w = 0.4 + Math.random() * 1.2;
    const h = 0.3 + Math.random() * 0.7;
    const b = edges(new THREE.BoxGeometry(w, h, w), wireMat);
    b.position.set((Math.random() - 0.5) * (TRENCH_W - 3), fy + h / 2, (Math.random() - 0.5) * (SEG_LEN - 2));
    g.add(b);
  }
  // recessed access-hatch outlines etched into the deck
  for (let i = 0; i < 3; i++) {
    const hatch = wire(new THREE.PlaneGeometry(1.2 + Math.random() * 1.5, 1.0 + Math.random() * 1.5), dimMat);
    hatch.rotation.x = -Math.PI / 2;

// merge a static group's parts into <=3 batched objects (fill + bright lines + dim lines)
// to slash draw calls. Geometry is baked relative to the group so it can still be moved.
function optimizeStatic(group) {
  group.updateMatrixWorld(true);
  const inv = new THREE.Matrix4().copy(group.matrixWorld).invert();
  const fills = [];
  const lineBuckets = new Map();        // material -> [geometries], preserves line colours
  group.traverse((o) => {
    if (o === group || !o.geometry) return;
    if (!(o.isMesh || o.isLineSegments)) return;
    const g = o.geometry.clone();
    g.applyMatrix4(new THREE.Matrix4().multiplyMatrices(inv, o.matrixWorld));
    if (o.isMesh) {
      fills.push(g);
    } else {
      if (!lineBuckets.has(o.material)) lineBuckets.set(o.material, []);
      lineBuckets.get(o.material).push(g);
    }
  });
  while (group.children.length) group.remove(group.children[0]);
  if (fills.length) { const m = mergeGeometries(fills, false); if (m) group.add(new THREE.Mesh(m, fillMat)); }
  for (const [mat, geos] of lineBuckets) {
    const m = mergeGeometries(geos, false);
    if (m) group.add(new THREE.LineSegments(m, mat));
  }
}

for (let i = 0; i < SEG_COUNT; i++) {

function sdLine(a, b) { return new THREE.Line(new THREE.BufferGeometry().setFromPoints([a, b]), sdMat); }
function makeStarDestroyer() {
  const g = new THREE.Group();

    ...tri(bow, str, sbr),                        // right flank
    ...tri(sbl, sbr, str), ...tri(sbl, str, stl), // stern face
  ], 3));
  g.add(sdLines(hull));

  // longitudinal trench lines down the top deck, converging toward the bow
  for (const t of [-0.72, -0.4, 0.4, 0.72]) {
    g.add(sdLine(new THREE.Vector3(HW * t * 0.06, TH * 0.55, -L * 0.92),

  for (const zf of [0.22, 0.42, 0.62, 0.82]) {

    g.add(sdLine(new THREE.Vector3(-w, y, -L * zf), new THREE.Vector3(w, y, -L * zf)));
  }
  // central dorsal ridge
  g.add(sdLine(new THREE.Vector3(0, TH * 0.6, -L * 0.9), new THREE.Vector3(0, TH + 1, -2)));

  // stepped superstructure "city" block - two tiers
  const sup1 = sdLines(new THREE.BoxGeometry(HW * 0.8, 9, L * 0.32));
  sup1.position.set(0, TH + 4.5, -L * 0.13); g.add(sup1);
  const sup2 = sdLines(new THREE.BoxGeometry(HW * 0.52, 8, L * 0.2));
  sup2.position.set(0, TH + 12, -L * 0.11); g.add(sup2);

  // bridge tower on a neck + twin shield domes
  const neck = sdLines(new THREE.BoxGeometry(HW * 0.2, 7, HW * 0.2));

// ---------- background dogfight: TIE fighters vs X-wings ----------
// hexagonal solar panel with radial spokes + inner hex (matches the reference)
function tiePanelLines(r, mat) {
  const v = [];
  for (let i = 0; i < 6; i++) { const a = i / 6 * Math.PI * 2 + Math.PI / 6; v.push(new THREE.Vector3(Math.cos(a) * r, Math.sin(a) * r, 0)); }
  const pts = [];
  for (let i = 0; i < 6; i++) { pts.push(v[i], v[(i + 1) % 6]); }                                   // outer hexagon
  for (let i = 0; i < 6; i++) { pts.push(new THREE.Vector3(0, 0, 0), v[i]); }                        // radial spokes
  for (let i = 0; i < 6; i++) { pts.push(v[i].clone().multiplyScalar(0.45), v[(i + 1) % 6].clone().multiplyScalar(0.45)); } // inner hex
  return new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(pts), mat);
}
function buildTIE(mat) {
  const g = new THREE.Group();
  g.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.IcosahedronGeometry(1.0, 0)), mat));  // faceted cockpit ball
  for (const sx of [-1, 1]) {
    const panel = tiePanelLines(2.5, mat);          // big hex solar wing facing forward
    panel.position.x = sx * 2.8;
    g.add(panel);
    const strut = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(1.6, 0.18, 0.18)), mat);
    strut.position.x = sx * 1.45;
    g.add(strut);
  }
  return g;
}
function makeTIE() {
  const g = buildTIE(sdMat);
  optimizeStatic(g);
  return g;
}
function makeSkyXWing() {
  const g = new THREE.Group();
  // Object3D.lookAt() aims the +Z axis at the target (NOT -Z like a camera),
  // so the nose must live at +Z for the ship to actually fly nose-first.
  const body = wire(new THREE.CylinderGeometry(0.04, 0.42, 5.0, 6), sdMat);
  body.rotation.x = Math.PI / 2;    // sharp tip -> +Z (front / direction of travel)
  g.add(body);
  for (const [sx, sy] of [[1, 1], [1, -1], [-1, 1], [-1, -1]]) {
    const wing = wire(new THREE.BoxGeometry(4.2, 0.1, 1.2), sdMat);
    wing.position.set(sx * 2.3, sy * 0.45, -1.7);                                 // wings at the rear (-Z)
    wing.rotation.z = sx * sy * 0.5;                                              // X-foil spread
    g.add(wing);
  }
  optimizeStatic(g);
  return g;
}

  const color = s.userData.type === "tie" ? 0x33ff66 : 0xff2222;   // TIE green vs X-wing red
  const dir = s.userData.vel.clone().normalize();
  const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), dir.clone().multiplyScalar(7)]);
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color, fog: false }));
  line.position.copy(s.position);

const _skyLook = new THREE.Vector3();
function updateSkyBattle(dt) {
  for (const s of skyShips) {
    s.userData.vel.x += (Math.random() - 0.5) * 0.03;
    s.userData.vel.y += (Math.random() - 0.5) * 0.015;
    s.position.addScaledVector(s.userData.vel, dt * 60);
    s.lookAt(_skyLook.copy(s.position).add(s.userData.vel));
    if (s.position.x >  220) s.userData.vel.x = -Math.abs(s.userData.vel.x);
    if (s.position.x < -220) s.userData.vel.x =  Math.abs(s.userData.vel.x);
    if (s.position.y >  108) s.userData.vel.y = -Math.abs(s.userData.vel.y);
    if (s.position.y <   28) s.userData.vel.y =  Math.abs(s.userData.vel.y);
    if (s.position.z >  -100) s.userData.vel.z = -Math.abs(s.userData.vel.z);
    if (s.position.z < -430) s.userData.vel.z =  Math.abs(s.userData.vel.z);
    s.userData.fire -= dt;
    if (s.userData.fire <= 0) { spawnSkyLaser(s); s.userData.fire = 1.2 + Math.random() * 3.5; }
  }
  for (let i = skyLasers.length - 1; i >= 0; i--) {
    const l = skyLasers[i];
    l.position.addScaledVector(l.userData.vel, dt * 60);
    l.userData.life -= dt;
    if (l.userData.life <= 0) { scene.remove(l); skyLasers.splice(i, 1); }
  }
}

function spawnCameo() {

// ---------- X-WING (proper) ----------
function makeXWing() {
  const g = new THREE.Group();
  const M = wireMat;

  // fuselage - ONE continuous faceted wedge hull, lofted from a flattened hexagon
  // cross-section to a sharp nose point (matches the reference: long, angular, flat-ish)
  {
    const prof = [                       // flattened hexagon (wider than tall), unit
      [ 0.42,  0.04], [ 0.25,  0.26], [-0.25,  0.26],
      [-0.42,  0.04], [-0.22, -0.22], [ 0.22, -0.22],
    ];
    const stations = [                   // [z, scale] rear -> nose tip
      [ 1.55, 1.00], [ 0.40, 1.00], [-1.10, 0.90],
      [-2.30, 0.60], [-3.20, 0.24], [-3.80, 0.0],
    ];
    const Np = prof.length;
    const rings = stations.map(([z, s]) => prof.map(([x, y]) => [x * s, y * s, z]));
    const pos = [];
    for (let r = 0; r < rings.length - 1; r++) {
      for (let i = 0; i < Np; i++) {
        const a = rings[r][i], b = rings[r][(i + 1) % Np];
        const c = rings[r + 1][(i + 1) % Np], d = rings[r + 1][i];
        pos.push(...a, ...b, ...c, ...a, ...c, ...d);   // quad -> 2 tris
      }
    }
    const rear = [0, 0, stations[0][0]];                 // rear cap fan
    for (let i = 0; i < Np; i++) pos.push(...rear, ...rings[0][(i + 1) % Np], ...rings[0][i]);
    const hullGeo = new THREE.BufferGeometry();
    hullGeo.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
    hullGeo.computeVertexNormals();
    g.add(edges(hullGeo, M));
  }

  // angular cockpit canopy - boxy windscreen, NOT a dome
  const canopy = edges(new THREE.BoxGeometry(0.46, 0.3, 0.8), M);
  canopy.position.set(0, 0.27, -0.2);
  g.add(canopy);
  // sloped windscreen panel toward the nose
  const windscreen = edges(new THREE.BoxGeometry(0.42, 0.28, 0.55), M);
  windscreen.position.set(0, 0.22, -0.78);
  windscreen.rotation.x = -0.6;
  g.add(windscreen);

  // R2 astromech socket behind the cockpit (small, low-poly - not a big ball)
  const r2body = edges(new THREE.CylinderGeometry(0.15, 0.15, 0.2, 6), M);
  r2body.position.set(0, 0.32, 0.5);
  g.add(r2body);
  const r2dome = edges(new THREE.SphereGeometry(0.15, 6, 3, 0, Math.PI * 2, 0, Math.PI / 2), M);
  r2dome.position.set(0, 0.42, 0.5);
  g.add(r2dome);

  // engines - chunky 2x2 cluster at rear with detailed glowing turbine nozzles
  const engineGeo = new THREE.CylinderGeometry(0.34, 0.30, 1.7, 14);
  const ePos = [
    [-0.52,  0.52, 1.55],
    [ 0.52,  0.52, 1.55],
    [-0.52, -0.52, 1.55],
    [ 0.52, -0.52, 1.55],
  ];
  const engineGlows = [];
  for (const [x, y, z] of ePos) {
    const e = edges(engineGeo, M);
    e.rotation.x = Math.PI / 2;
    e.position.set(x, y, z);
    g.add(e);

    // panel bands around the nacelle body (greeble detail)
    for (const pz of [z - 0.45, z, z + 0.45]) {
      const band = wire(new THREE.TorusGeometry(0.335, 0.018, 4, 16), M);
      band.position.set(x, y, pz);
      g.add(band);
    }
    // intake cowl + bore rings at the front (nose side)
    const cowl = edges(new THREE.CylinderGeometry(0.30, 0.34, 0.26, 14), M);
    cowl.rotation.x = Math.PI / 2;
    cowl.position.set(x, y, z - 0.95);
    g.add(cowl);
    for (const rr of [0.25, 0.16, 0.08]) {
      const ring = wire(new THREE.TorusGeometry(rr, 0.02, 4, 16), M);
      ring.position.set(x, y, z - 1.02);
      g.add(ring);
    }

    // ---- rear glowing exhaust nozzle (the bit the player stares at) ----
    // sits just PROUD of the nacelle's solid rear cap (local z+0.85) so the
    // cap can't occlude it - the dark cap becomes the glow's backing instead.
    const zr = z + 0.86;
    // wireframe nozzle lip (no solid fill, so nothing hides the glow)
    const rim = wire(new THREE.TorusGeometry(0.31, 0.03, 6, 18), M);
    rim.position.set(x, y, zr + 0.12);
    g.add(rim);
    // stacked glow discs against the dark cap: deep red -> orange -> hot core
    const disc = (r, col, dz) => {
      const m = new THREE.Mesh(new THREE.CircleGeometry(r, 18),
        new THREE.MeshBasicMaterial({ color: col }));
      m.position.set(x, y, zr + dz);
      g.add(m); return m;
    };
    disc(0.28, 0xff463c, 0.02);                // deep red base (palette red)
    disc(0.19, 0xff8c46, 0.06);                // orange mid (palette orange)
    const core = disc(0.10, 0xffe0c0, 0.10);   // white-hot core
    // turbine vanes across the glow (thin spokes)
    const spokePts = [], NV = 10;
    for (let i = 0; i < NV; i++) {
      const a = (i / NV) * Math.PI * 2, c = Math.cos(a), s = Math.sin(a);
      spokePts.push(
        new THREE.Vector3(x + c * 0.07, y + s * 0.07, zr + 0.08),
        new THREE.Vector3(x + c * 0.27, y + s * 0.27, zr + 0.08),
      );
    }
    g.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(spokePts), M));
    engineGlows.push(core);

    // exhaust glow trail streaming back
    const trailGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, y, zr + 0.12),
      new THREE.Vector3(x, y, z + 3.9),
    ]);
    const trail = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({ color: 0xff7733, transparent: true, opacity: 0.5 }));
    g.add(trail);
  }
  g.userData.engineGlows = engineGlows;

  // wings - 4 in X arrangement
  const cannonTips = [];
  const ANG = 0.42; // ~24 deg
  const wingDefs = [
    { side:  1, rotZ:  ANG }, // right upper
    { side:  1, rotZ: -ANG }, // right lower
    { side: -1, rotZ:  ANG }, // left upper (mirrored via scale.x = -1)
    { side: -1, rotZ: -ANG }, // left lower
  ];

  for (const w of wingDefs) {
    const wg = new THREE.Group();
    wg.position.z = 1.4;

    // wing plate
    const wing = edges(new THREE.BoxGeometry(2.6, 0.08, 0.95), M);
    wing.position.set(1.5, 0, 0);
    wg.add(wing);

    // panel lines across wing
    for (const px of [0.7, 1.5, 2.3]) {
      const lineG = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(px, 0.05, -0.45),
        new THREE.Vector3(px, 0.05,  0.45),
      ]);
      wg.add(new THREE.Line(lineG, M));
    }

    // wingtip housing
    const tip = edges(new THREE.BoxGeometry(0.4, 0.32, 0.95), M);
    tip.position.set(2.8, 0, 0);
    wg.add(tip);

    // long cannon barrel passing through the wingtip - projects forward and aft
    const cannon = edges(new THREE.CylinderGeometry(0.06, 0.06, 3.4, 8), M);
    cannon.rotation.x = Math.PI / 2;
    cannon.position.set(2.8, 0, -1.0);
    wg.add(cannon);

    // forward muzzle detail
    const muzzleDetail = edges(new THREE.CylinderGeometry(0.1, 0.06, 0.45, 8), M);
    muzzleDetail.rotation.x = Math.PI / 2;
    muzzleDetail.position.set(2.8, 0, -2.6);
    wg.add(muzzleDetail);

    // aft cap behind the wingtip
    const aft = edges(new THREE.BoxGeometry(0.16, 0.16, 0.35), M);
    aft.position.set(2.8, 0, 0.65);
    wg.add(aft);

    // muzzle tip marker (for laser origin)
    const tipMarker = new THREE.Object3D();
    tipMarker.position.set(2.8, 0, -2.9);
    wg.add(tipMarker);
    cannonTips.push(tipMarker);

    wg.rotation.z = w.rotZ;
    if (w.side < 0) wg.scale.x = -1;
    g.add(wg);
  }

  g.userData.cannons = cannonTips;
  // scale whole ship a bit
  g.scale.setScalar(0.85);
  return g;
}

function makeTurret(kind = 0, isSurface = false) {
  const g = new THREE.Group();

  // static tower base (merged into one batch at the end)
  const base = new THREE.Group();
  g.add(base);

  // compact emplacement base (wide mount + a single riser - reads as a gun, not a tower)
  const tiers = heavy
    ? [[2.3, 0.8, 2.3, 0.4], [1.6, 0.8, 1.6, 1.15], [1.2, 0.55, 1.2, 1.75]]
    : [[2.0, 0.8, 2.0, 0.4], [1.35, 0.7, 1.35, 1.1]];
  for (const [w, h, d, y] of tiers) {
    const box = edges(new THREE.BoxGeometry(w, h, d), turretMat);
    box.position.y = y;
    base.add(box);
  }
  const headY = heavy ? 2.3 : 1.65;

  // greeble boxes clinging to the tower
  for (let i = 0; i < 5; i++) {
    const s = 0.25 + Math.random() * 0.4;
    const gb = edges(new THREE.BoxGeometry(s, s, s), turretMat);
    const ang = Math.random() * Math.PI * 2;
    const r = 0.7 + Math.random() * 0.4;
    gb.position.set(Math.cos(ang) * r, 0.3 + Math.random() * (headY - 0.6), Math.sin(ang) * r);
    base.add(gb);
  }

  // rotating turret head - barrels point toward -Z so head.lookAt(player) aims them
  const head = new THREE.Group();
  head.position.y = headY;

  const headBox = edges(new THREE.BoxGeometry(1.5, 0.95, 1.6), turretMat);
  head.add(headBox);
  // mantlet where the barrels mount
  const mantlet = edges(new THREE.BoxGeometry(1.15, 0.6, 0.8), turretMat);
  mantlet.position.z = -0.85;
  head.add(mantlet);
  // twin barrels - long and chunky so they read at distance
  for (const ox of [-0.36, 0.36]) {
    const barrel = edges(new THREE.CylinderGeometry(0.12, 0.12, 2.8, 8), turretMat);
    barrel.rotation.x = Math.PI / 2;
    barrel.position.set(ox, 0, -2.0);
    head.add(barrel);
    const muzzle = edges(new THREE.CylinderGeometry(0.17, 0.17, 0.4, 8), turretMat);
    muzzle.rotation.x = Math.PI / 2;
    muzzle.position.set(ox, 0, -3.3);
    head.add(muzzle);
  }
  g.add(head);

  // batch the static parts (head stays a Group so it can still rotate to aim)
  optimizeStatic(base);
  optimizeStatic(head);

  // glowing red targeting eye - only on the wall threats (rim turrets fire into space,
  // so an eye there just reads as a stuck red bolt). Added after merge to keep its material.
  if (!isSurface) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.16, 10, 8), new THREE.MeshBasicMaterial({ color: 0xff3322 }));
    eye.position.set(0, 0.42, -1.4);
    head.add(eye);
  }

  // imposing turbolasers (20% smaller than before)
  const scale = 2.24;
  g.scale.setScalar(scale);

  g.userData.head = head;
  // progressive difficulty: +1 HP per 2500m travelled
  g.userData.health = (heavy ? 4 : 3) + Math.floor(state.dist / 2500);
  g.userData.cooldown = 0.3 + Math.random() * 1.0;       // shorter delay before first shot
  g.userData.aimWorld = new THREE.Vector3();
  g.userData.hitR = 1.7 * scale;        // collision radius scales with the model
  return g;
}

function makeLaser(color, haloColor, len = 4.2) {
  // group with core + halo, both cylinders default along Y so lookAt+rotateX(PI/2) at fire time orients the GROUP correctly
  const grp = new THREE.Group();
  const core = new THREE.Mesh(
    new THREE.CylinderGeometry(0.28, 0.28, len, 8),
    new THREE.MeshBasicMaterial({ color })
  );
  grp.add(core);
  const halo = new THREE.Mesh(
    new THREE.CylinderGeometry(0.55, 0.55, len, 8),
    new THREE.MeshBasicMaterial({ color: haloColor ?? color, transparent: true, opacity: 0.35 })
  );
  grp.add(halo);
  return grp;
}

function findTarget(origin) {
  // closest turret or attacking TIE ahead of origin within a forward cone
  let best = null, bestScore = Infinity;
  const consider = (t, bias) => {
    const p = t.userData.aimWorld;
    const dx = p.x - origin.x, dy = p.y - origin.y, dz = p.z - origin.z;
    if (dz > -2) return;                              // must be ahead
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
    if (dist > 180) return;
    const lateral = Math.sqrt(dx * dx + dy * dy);
    if (Math.atan2(lateral, -dz) > 0.55) return;      // ~31 deg cone
    const score = dist + lateral * 6 - bias;          // bias prioritises urgent threats
    if (score < bestScore) { bestScore = score; best = t; }
  };
  for (const t of turrets) consider(t, 0);
  for (const t of surfaceTurrets) consider(t, t.userData.hostile ? 60 : 0);  // rim cannons targetable too
  for (const t of trenchTies) consider(t, 120);       // prefer the incoming TIE
  for (const t of megaTurrets) consider(t, 240);      // the boss is the priority lock
  if (boba && state.bobaActive) consider(boba, 240);  // lock Boba during his duel
  return best;
}

// ---------- mega turret boss (the 300m showdown) ----------
function makeMegaTurret() {
  const g = new THREE.Group();
  const M = turretMat;
  // ---- broad, stacked emplacement base ----
  const base = new THREE.Group();
  const tiers = [[4.2, 1.5, 4.2, 0.75], [3.3, 1.4, 3.3, 2.1], [2.5, 1.2, 2.5, 3.3], [1.9, 1.0, 1.9, 4.3]];
  for (const [w, h, d, y] of tiers) { const b = edges(new THREE.BoxGeometry(w, h, d), M); b.position.y = y; base.add(b); }
  // corner buttress fins
  for (let i = 0; i < 4; i++) {
    const a = i * Math.PI / 2 + Math.PI / 4;
    const fin = edges(new THREE.BoxGeometry(0.5, 3.0, 1.2), M);
    fin.position.set(Math.cos(a) * 1.9, 1.6, Math.sin(a) * 1.9); fin.rotation.y = a; base.add(fin);
  }
  // hull greebles clinging to the tower
  for (let i = 0; i < 10; i++) {
    const s = 0.35 + Math.random() * 0.6;
    const gb = edges(new THREE.BoxGeometry(s, s, s), M);
    const a = Math.random() * Math.PI * 2, r = 1.6 + Math.random() * 0.8;
    gb.position.set(Math.cos(a) * r, 0.6 + Math.random() * 3.6, Math.sin(a) * r); base.add(gb);
  }
  g.add(base);

  // ---- rotating head: TWO twin-barrel gun pods (four cannons) ----
  const headY = 5.6;
  const head = new THREE.Group();
  head.position.y = headY;
  head.add(edges(new THREE.BoxGeometry(3.0, 1.8, 2.6), M));            // command body
  const cap = edges(new THREE.BoxGeometry(2.0, 0.6, 2.0), M); cap.position.y = 1.2; head.add(cap);
  const mast = edges(new THREE.CylinderGeometry(0.07, 0.07, 1.6, 6), M); mast.position.set(0, 2.1, 0.2); head.add(mast);
  const dish = wire(new THREE.SphereGeometry(0.4, 8, 4, 0, Math.PI * 2, 0, Math.PI / 2), M);
  dish.position.set(0, 2.7, 0.2); dish.rotation.x = -0.5; head.add(dish);
  // barrels sit on +Z so head.lookAt(player) (which aims +Z) points the guns AT you
  const muzzles = [];
  for (const px of [-1.15, 1.15]) {
    const pod = edges(new THREE.BoxGeometry(1.1, 1.2, 1.4), M); pod.position.set(px, 0, 1.0); head.add(pod);
    const mantlet = edges(new THREE.BoxGeometry(0.9, 0.8, 0.7), M); mantlet.position.set(px, 0, 1.7); head.add(mantlet);
    for (const ox of [-0.32, 0.32]) {
      const barrel = edges(new THREE.CylinderGeometry(0.15, 0.15, 4.4, 8), M);
      barrel.rotation.x = Math.PI / 2; barrel.position.set(px + ox, 0, 3.0); head.add(barrel);
      const muz = edges(new THREE.CylinderGeometry(0.24, 0.2, 0.6, 8), M);
      muz.rotation.x = Math.PI / 2; muz.position.set(px + ox, 0, 5.2); head.add(muz);
    }
    muzzles.push(new THREE.Vector3(px, 0, 5.4));
  }
  g.add(head);
  optimizeStatic(base); optimizeStatic(head);
  // big red targeting eyes facing the player (one per pod) - added after merge to keep colour
  for (const px of [-1.15, 1.15]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 8), new THREE.MeshBasicMaterial({ color: 0xff3322 }));
    eye.position.set(px, 0.55, 1.5); head.add(eye);
  }

  const scale = 1.75;
  g.scale.setScalar(scale);
  g.userData.head = head;
  g.userData.health = 27;                // +35% tougher
  g.userData.maxHealth = 27;
  g.userData.mega = true;
  g.userData.hitR = 5.5;                 // big, easy-to-hit boss target
  g.userData.cooldown = 0.9 + Math.random() * 0.8;
  g.userData.aimWorld = new THREE.Vector3();
  g.userData.muzzles = muzzles;          // two pods -> twin-bolt volleys
  return g;
}

// ---------- speed streaks ----------
const streaks = [];
function spawnStreak() {
  const len = 5 + Math.random() * 8;
  let x, y;
  const face = Math.floor(Math.random() * 4);
  if (face === 0)      { x = -TRENCH_W / 2 + 0.05; y = (Math.random() - 0.5) * TRENCH_H * 0.9; }
  else if (face === 1) { x =  TRENCH_W / 2 - 0.05; y = (Math.random() - 0.5) * TRENCH_H * 0.9; }
  else if (face === 2) { x = (Math.random() - 0.5) * TRENCH_W * 0.9; y = -TRENCH_H / 2 + 0.05; }
  else                 { x = (Math.random() - 0.5) * TRENCH_W * 0.9; y =  TRENCH_H / 2 - 0.05; }

  const z = -120 - Math.random() * 60;
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x, y, z),
    new THREE.Vector3(x, y, z + len),
  ]);
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x88ffaa, transparent: true, opacity: 0.9 }));
  scene.add(line);
  streaks.push(line);
}

const hudScore = document.getElementById("score");
const hudCombo = document.getElementById("combo");
const shieldFill = document.getElementById("shieldfill");

const _projVec = new THREE.Vector3();
function updateReticle() {
  const target = state.alive ? findTarget(xwing.position) : null;
  if (target) {
    _projVec.copy(target.userData.aimWorld).project(camera);
    if (_projVec.z < 1) {

function comboMult() { return Math.min(5, 1 + Math.floor(state.combo / 2)); }
function scoreKill(base) {                 // award a kill with the streak multiplier
  state.combo += 1;
  state.comboTimer = 3.0;

function restart() {
  for (const arr of [playerShots, enemyShots, debris, turrets, flashes, trenchTies, empWaves, surfaceTurrets, megaTurrets, bobaMissiles, cameos, pickups]) {
    for (const o of arr) scene.remove(o);
    arr.length = 0;
  }
  if (boba) { scene.remove(boba); boba = null; }
  state.score = 0; state.shields = 100; state.dist = 0; state.alive = true;
  state.emps = 3; state.nextTieDist = 700; state.nextStrafeDist = 1100; state.nextSurfaceDist = 130;
  state.entering = false; state.distAcc = 0;
  state.bossActive = false; state.bossDone = false; state.curSpeed = 1.0;
  state.bobaActive = false; state.bobaDone = false; state.bobaTimer = 0;
  state.nextCameoDist = 350;
  state.combo = 0; state.comboTimer = 0; state.camShake = 0;
  state.nextPickupDist = 550; state.warnedBoss = false; state.warnedBoba = false;
  bossEl.classList.add("hidden"); bobaEl.classList.add("hidden");
  bannerEl.style.opacity = "0"; bannerTimer = 0; bossDimEl.style.opacity = "0";
  if (engine && actx) engine.g.gain.linearRampToValueAtTime(0.04, actx.currentTime + 0.4);  // engine back up
  startMusic();

  xwing.visible = true;

// ---------- loop ----------
const clock = new THREE.Clock();

function update(dt) {
  if (!state.started || !state.alive) return;

  // input
  const mv = new THREE.Vector3();
  if (keys["ArrowLeft"] || keys["KeyA"]) mv.x -= 1;
  if (keys["ArrowRight"]|| keys["KeyD"]) mv.x += 1;
  if (keys["ArrowUp"]   || keys["KeyW"]) mv.y += 1;
  if (keys["ArrowDown"] || keys["KeyS"]) mv.y -= 1;
  if (mv.lengthSq() > 0) mv.normalize().multiplyScalar(10 * dt);

  const xEdge = TRENCH_W / 2 - 2.5, yEdge = TRENCH_H / 2 - 2;
  xwing.position.x = THREE.MathUtils.clamp(xwing.position.x + mv.x, -xEdge, xEdge);
  xwing.position.y = THREE.MathUtils.clamp(xwing.position.y + mv.y, -yEdge, yEdge);

  // wall scrape: riding the trench edge throws sparks and bleeds shields
  let scrapeSign = 0, scrapeY = 0;
  if (xwing.position.x >= xEdge - 0.02) scrapeSign = 1;
  else if (xwing.position.x <= -xEdge + 0.02) scrapeSign = -1;
  if (xwing.position.y >= yEdge - 0.02) scrapeY = 1;
  else if (xwing.position.y <= -yEdge + 0.02) scrapeY = -1;
  if (scrapeSign || scrapeY) {
    // throw a big shower of sparks from the contact edge, near the wingtip
    for (let s = 0; s < 9; s++) {
      const cp = new THREE.Vector3(
        scrapeSign ? scrapeSign * (TRENCH_W / 2 - 0.5) : xwing.position.x + (Math.random() - 0.5) * 5,
        scrapeY ? scrapeY * (TRENCH_H / 2 - 0.5) : xwing.position.y + (Math.random() - 0.5) * 2,
        xwing.position.z + (Math.random() - 0.5) * 3);
      spawnSparks(cp, 1);
    }
    dmgFlash.style.opacity = "0.85";          // red edge flash while scraping
    state.shields -= 12.8 * dt; addShake(0.14);
    state.scrapeSnd -= dt;
    if (state.scrapeSnd <= 0) { sfxScrape(); state.scrapeSnd = 0.09; }
    if (state.shields <= 0) { gameOver(); return; }
  } else {
    dmgFlash.style.opacity = "0";
  }

  // bank + pitch
  xwing.rotation.z = THREE.MathUtils.lerp(xwing.rotation.z, -mv.x * 2.0, 0.18);
  xwing.rotation.x = THREE.MathUtils.lerp(xwing.rotation.x,  mv.y * 0.9, 0.18);

  // ambient R2 chirps now and then
  state.bleepTimer -= dt;
  if (state.bleepTimer <= 0) { sfxR2Bleep(); state.bleepTimer = 7 + Math.random() * 9; }

  // kill-streak decay
  if (state.comboTimer > 0) { state.comboTimer -= dt; if (state.comboTimer <= 0) state.combo = 0; }

  // boost
  const boosting = keys["ShiftLeft"] || keys["ShiftRight"];
  state.boostMul = boosting ? 2.2 : 1.0;
  setEngineBoost(boosting);
  // engine cores flare on boost, with a subtle idle flicker
  if (xwing.userData.engineGlows) {
    const tgt = (boosting ? 1.7 : 1.0) * (0.9 + Math.random() * 0.2);
    for (const c of xwing.userData.engineGlows)
      c.scale.x = c.scale.y = THREE.MathUtils.lerp(c.scale.x, tgt, 0.25);
  }
  // FOV pulse on boost
  const targetFov = boosting ? BASE_FOV + 12 : BASE_FOV;
  camera.fov = THREE.MathUtils.lerp(camera.fov, targetFov, 0.12);
  camera.updateProjectionMatrix();

  // telegraph the bosses ~250m out
  if (!state.warnedBoss && !state.bossDone && state.dist >= state.bossDist - 250) { state.warnedBoss = true; bannerFlash("WARNING"); }
  if (!state.warnedBoba && !state.bobaDone && state.dist >= state.bobaDist - 250) { state.warnedBoba = true; bannerFlash("WARNING"); }
  // boss encounters: the world eases to a crawl while a boss is up
  if (!state.bossActive && !state.bossDone && state.dist >= state.bossDist) startBoss();
  if (!state.bobaActive && !state.bobaDone && state.dist >= state.bobaDist) startBoba();
  const speedTarget = state.bossActive ? 0.12 : (state.bobaActive ? 0.2 : 1.0);
  state.curSpeed = THREE.MathUtils.lerp(state.curSpeed, speedTarget, 0.04);
  if (bannerTimer > 0) { bannerTimer -= dt; if (bannerTimer <= 0) bannerEl.style.opacity = "0"; }

  const forward = state.speed * state.boostMul * state.curSpeed * 60 * dt;
  state.dist += forward;
  // distance scoring: +1 point per 10m flown
  state.distAcc += forward;
  while (state.distAcc >= 10) { state.score += 1; state.distAcc -= 10; }

  // fire
  state.fireCool -= dt;
  if (keys["Space"] && state.fireCool <= 0) {
    fireFromXwing();
    state.fireCool = 0.14;
  }

  // scroll world toward player
  const scroll = forward * 0.25;

  for (const seg of trenchSegments) {
    seg.position.z += scroll;
    if (seg.position.z > SEG_LEN) {
      const minZ = Math.min(...trenchSegments.map(s => s.position.z));
      seg.position.z = minZ - SEG_LEN;
    }
  }

  // normal spawners pause during any boss duel
  if (!state.bossActive && !state.bobaActive) {
    // distance-based turret spawner - evenly spaced, appears within view range
    if (state.dist >= state.nextTurretDist) {
      spawnTurret(-300 + (Math.random() - 0.5) * 50);
      state.nextTurretDist = state.dist + (state.bobaDone ? 150 : 240) + Math.random() * 90;   // denser after Boba
    }

    // occasional attacking TIE that strafes down the trench at you
    if (state.dist >= state.nextTieDist) {
      spawnTrenchTie();
      state.nextTieDist = state.dist + (state.bobaDone ? 520 : 900) + Math.random() * 600;
    }

    // occasional TIE diving in from the sky for a strafing run
    if (state.dist >= state.nextStrafeDist) {
      spawnStrafer();
      state.nextStrafeDist = state.dist + 1100 + Math.random() * 900;
    }

    // rim turbolasers lining the trench top, firing into space
    if (state.dist >= state.nextSurfaceDist) {
      spawnSurfaceTurret(-300, Math.random() < 0.5 ? -1 : 1);
      state.nextSurfaceDist = state.dist + 110 + Math.random() * 90;
    }

    // occasional joke fly-by drifting overhead
    if (state.dist >= state.nextCameoDist) {
      spawnCameo();
      state.nextCameoDist = state.dist + 900 + Math.random() * 1500;
    }

    // shield + EMP pickups to grab
    if (state.dist >= state.nextPickupDist) {
      spawnPickup();
      state.nextPickupDist = state.dist + 700 + Math.random() * 500;
    }
  }

  // streaks
  for (let i = streaks.length - 1; i >= 0; i--) {
    const s = streaks[i];
    s.position.z += scroll * 1.4;
    if (s.position.z > 40) {
      scene.remove(s);
      streaks.splice(i, 1);
    }
  }
  // top up streaks
  while (streaks.length < 36) spawnStreak();

  // starfield parallax (distant - scrolls slowly, wraps)
  const sArr = stars.geometry.attributes.position.array;
  const wrapTo = camera.position.z + 70;
  for (let i = 0; i < STAR_COUNT; i++) {
    let z = sArr[i * 3 + 2] + scroll * 0.18;
    if (z > wrapTo) z -= STAR_SPAN_Z;
    sArr[i * 3 + 2] = z;
  }
  stars.geometry.attributes.position.needsUpdate = true;

  // turrets
  for (let i = turrets.length - 1; i >= 0; i--) {
    const t = turrets[i];
    t.position.z += scroll;
    if (t.position.z > 16) { scene.remove(t); turrets.splice(i, 1); continue; }
    t.userData.head.lookAt(xwing.position);
    t.userData.head.getWorldPosition(t.userData.aimWorld);   // gun position for aim/hit
    if (t.position.z < -3 && t.position.z > -240) {            // fire while still approaching
      t.userData.cooldown -= dt;
      if (t.userData.cooldown <= 0) {
        fireFromTurret(t);
        const dmul = Math.max(0.45, 1 - state.dist / 18000);   // fire faster the deeper you get
        t.userData.cooldown = (0.8 + Math.random() * 1.4) * dmul;
      }
    }
  }

  // attacking TIEs - strafe down the trench at the player
  for (let i = trenchTies.length - 1; i >= 0; i--) {
    const tie = trenchTies[i];
    tie.userData.phase += dt * 4;
    tie.position.x += Math.sin(tie.userData.phase) * 8 * dt;       // weave
    tie.position.addScaledVector(tie.userData.vel, dt);
    tie.userData.aimWorld.copy(tie.position);
    tie.lookAt(xwing.position);
    if (tie.position.distanceTo(xwing.position) < 2.4) {          // rammed the player
      explode(tie.position, 0x88d8ff, 26, 1.4);
      sfxExplosion(false);
      scene.remove(tie); trenchTies.splice(i, 1);
      state.shields -= 17.6; state.combo = 0; addShake(0.65);
      explode(xwing.position, 0xff3344, 8, 1);
      if (state.shields <= 0) gameOver();
      continue;
    }
    // wider bounds so sky strafers (which dive from high up) aren't culled mid-run
    if (tie.position.z > 18 || tie.position.z < -260 ||
        Math.abs(tie.position.x) > 70 || tie.position.y > 90 || tie.position.y < -28) {
      scene.remove(tie); trenchTies.splice(i, 1); continue;
    }
    if (tie.position.z < -6) {
      tie.userData.fireCool -= dt;
      if (tie.userData.fireCool <= 0) { fireFromTie(tie); tie.userData.fireCool = 0.8 + Math.random(); }
    }
  }

  // rim turbolasers - 1 in 4 track and shoot at the player, the rest fire up into space
  for (let i = surfaceTurrets.length - 1; i >= 0; i--) {
    const t = surfaceTurrets[i];
    t.position.z += scroll;
    if (t.position.z > 22) { scene.remove(t); surfaceTurrets.splice(i, 1); continue; }
    t.userData.head.getWorldPosition(t.userData.aimWorld);    // gun position, for player targeting/hits
    if (t.userData.hostile && state.alive) {
      // depress the gun down into the trench and fire AT the player
      t.userData.head.lookAt(xwing.position);
      t.userData.head.getWorldPosition(t.userData.aimWorld);
      if (t.position.z < -3 && t.position.z > -250) {
        t.userData.fireCool -= dt;
        if (t.userData.fireCool <= 0) { fireFromTurret(t); t.userData.fireCool = 0.8 + Math.random() * 1.2; }
      }
    } else {
      // fire outward over the wall at a natural ~30 deg elevation into space
      t.userData.wander += dt * 0.6;
      const aim = t.userData.aimWorld.clone().add(new THREE.Vector3(
        t.userData.side * 28 + Math.sin(t.userData.wander) * 7,
        15 + Math.sin(t.userData.wander * 0.7) * 4,
        -6 + Math.cos(t.userData.wander) * 10));
      t.userData.head.lookAt(aim);
      t.userData.fireCool -= dt;
      if (t.userData.fireCool <= 0) { fireSurfaceTurret(t, aim); t.userData.fireCool = 0.6 + Math.random() * 1.4; }
    }
  }

  updatePickups(dt, scroll);

  // mega turret boss - hold station, track the player and pound away
  if (state.bossActive) {
    for (const t of megaTurrets) {
      t.userData.head.lookAt(xwing.position);
      t.userData.head.getWorldPosition(t.userData.aimWorld);
      t.userData.cooldown -= dt;
      if (t.userData.cooldown <= 0) {
        fireFromMega(t);
        t.userData.cooldown = 0.9 + Math.random() * 0.8;
      }
    }
    updateBossBars();
  }

  // Boba Fett duel - jetpack around, blast + missile, 45s timer
  if (state.bobaActive && boba) {
    state.bobaTimer -= dt;
    boba.userData.wanderT += dt;
    const wt = boba.userData.wanderT;
    boba.userData.target.set(Math.sin(wt * 0.9) * 5, 2.4 + Math.sin(wt * 1.7) * 2.6, -18 + Math.sin(wt * 0.6) * 7);
    boba.position.lerp(boba.userData.target, 0.04);
    boba.rotation.y = Math.atan2(xwing.position.x - boba.position.x, xwing.position.z - boba.position.z);  // face player, upright
    boba.userData.aimWorld.copy(boba.position); boba.userData.aimWorld.y += 0.3;
    if (boba.userData.flame) boba.userData.flame.scale.y = 0.7 + Math.random() * 0.6;
    if (boba.userData.halo) boba.userData.halo.material.opacity = 0.36 + 0.14 * Math.sin(boba.userData.wanderT * 4);
    boba.userData.fireCool -= dt;
    if (boba.userData.fireCool <= 0) { fireBobaBlaster(); boba.userData.fireCool = 0.55 + Math.random() * 0.6; }
    boba.userData.missileCool -= dt;
    if (boba.userData.missileCool <= 0) { fireBobaMissile(); boba.userData.missileCool = 6 + Math.random() * 3; }
    bobaBar.style.width = Math.max(0, state.bobaTimer / 45) * 100 + "%";
    if (state.bobaTimer <= 0) endBoba();
  }

  // Boba missiles - home gently toward the player; player can shoot them down
  for (let i = bobaMissiles.length - 1; i >= 0; i--) {
    const m = bobaMissiles[i];
    const desired = new THREE.Vector3().subVectors(xwing.position, m.position).normalize().multiplyScalar(0.7);
    m.userData.vel.lerp(desired, 0.04);
    m.position.add(m.userData.vel);
    m.lookAt(m.position.clone().add(m.userData.vel));
    m.userData.life -= dt;
    let gone = m.userData.life <= 0;
    if (m.position.distanceTo(xwing.position) < 1.9) {
      explode(m.position, 0xffaa33, 30, 1.8); sfxExplosion(true);
      if (state.alive) {
        state.shields -= 24; state.combo = 0; addShake(0.95); dmgFlash.style.opacity = "0.95";
        if (state.shields <= 0) gameOver();
      }
      gone = true;
    }
    if (gone) { scene.remove(m); bobaMissiles.splice(i, 1); }
  }

  // projectiles
  for (let i = playerShots.length - 1; i >= 0; i--) {
    const s = playerShots[i];
    // mild in-flight homing on the locked target (turret or TIE)
    if (s.userData.target && (turrets.includes(s.userData.target) || trenchTies.includes(s.userData.target) || megaTurrets.includes(s.userData.target))) {
      const desired = new THREE.Vector3().subVectors(s.userData.target.userData.aimWorld, s.position).normalize().multiplyScalar(3.4);
      s.userData.vel.lerp(desired, 0.18);
      s.lookAt(s.position.clone().add(s.userData.vel));
      s.rotateX(Math.PI / 2);
    }
    s.position.add(s.userData.vel);
    if (s.position.z < -250 || s.position.z > 30) { scene.remove(s); playerShots.splice(i, 1); continue; }
    let consumed = false;
    // mega turret boss takes priority hits
    for (let j = megaTurrets.length - 1; j >= 0; j--) {
      const t = megaTurrets[j];
      if (s.position.distanceTo(t.userData.aimWorld) < (t.userData.hitR || 5)) {
        scene.remove(s); playerShots.splice(i, 1); consumed = true;
        damageMega(t, 1);
        break;
      }
    }
    if (consumed) continue;
    // hits on Boba shave his timer (good shooting ends the fight sooner)
    if (boba && state.bobaActive && s.position.distanceTo(boba.userData.aimWorld) < 2.8) {
      scene.remove(s); playerShots.splice(i, 1); consumed = true;
      explode(boba.userData.aimWorld, 0xffee66, 8, 0.9);
      state.bobaTimer = Math.max(0, state.bobaTimer - 0.6);
      bobaBar.style.width = Math.max(0, state.bobaTimer / 45) * 100 + "%";
      if (state.bobaTimer <= 0) endBoba();
    }
    if (consumed) continue;
    // shoot down incoming missiles
    for (let j = bobaMissiles.length - 1; j >= 0; j--) {
      const m = bobaMissiles[j];
      if (s.position.distanceTo(m.position) < 1.2) {
        scene.remove(s); playerShots.splice(i, 1); consumed = true;
        explode(m.position, 0xffaa33, 18, 1.2); sfxExplosion(false);
        scene.remove(m); bobaMissiles.splice(j, 1);
        scoreKill(50);
        break;
      }
    }
    if (consumed) continue;
    for (let j = turrets.length - 1; j >= 0; j--) {
      const t = turrets[j];
      if (s.position.distanceTo(t.userData.aimWorld) < (t.userData.hitR || 1.8)) {
        t.userData.health -= 1;
        scene.remove(s); playerShots.splice(i, 1); consumed = true;
        if (t.userData.health <= 0) {
          // big secondary blast - two staged bursts for a meaty kill
          explode(t.userData.aimWorld, 0xffaa33, 70, 2.6);
          explode(t.userData.aimWorld, 0xff5522, 30, 1.6);
          sfxExplosion(true);
          scene.remove(t); turrets.splice(j, 1);
          scoreKill(100);
        } else {
          explode(t.userData.aimWorld, 0xffee66, 8, 0.9);
        }
        break;
      }
    }
    if (consumed) continue;
    for (let j = trenchTies.length - 1; j >= 0; j--) {
      const tie = trenchTies[j];
      if (s.position.distanceTo(tie.position) < (tie.userData.hitR || 2.0)) {
        tie.userData.health -= 1;
        scene.remove(s); playerShots.splice(i, 1);
        if (tie.userData.health <= 0) {
          explode(tie.position, 0xffaa33, 42, 1.8);
          explode(tie.position, 0x88d8ff, 16, 1.1);
          sfxExplosion(false);
          scene.remove(tie); trenchTies.splice(j, 1);
          scoreKill(150);
        } else {
          explode(tie.position, 0xffee66, 6, 0.8);
        }
        break;
      }
    }
    if (consumed) continue;
    for (let j = surfaceTurrets.length - 1; j >= 0; j--) {
      const rt = surfaceTurrets[j];
      if (s.position.distanceTo(rt.userData.aimWorld) < 2.4) {
        rt.userData.health -= 1;
        scene.remove(s); playerShots.splice(i, 1);
        if (rt.userData.health <= 0) {
          explode(rt.userData.aimWorld, 0xffaa33, 50, 2.0);
          explode(rt.userData.aimWorld, 0x88d8ff, 16, 1.2);
          sfxExplosion(true);
          scene.remove(rt); surfaceTurrets.splice(j, 1);
          scoreKill(rt.userData.hostile ? 100 : 25);
        } else {
          explode(rt.userData.aimWorld, 0xffee66, 6, 0.9);
        }
        break;
      }
    }
  }

  for (let i = enemyShots.length - 1; i >= 0; i--) {
    const s = enemyShots[i];
    s.position.add(s.userData.vel);
    if (s.position.z > 30 || s.position.z < -250 ||
        Math.abs(s.position.x) > 30 || Math.abs(s.position.y) > 30) {
      scene.remove(s); enemyShots.splice(i, 1); continue;
    }
    if (s.position.distanceTo(xwing.position) < 1.6) {
      scene.remove(s); enemyShots.splice(i, 1);
      if (!state.alive) continue;           // already destroyed this frame - don't re-flash the border
      state.shields -= 9.6; state.combo = 0; addShake(0.35);
      explode(xwing.position, 0xff3344, 6);
      sfxExplosion(false);
      dmgFlash.style.opacity = "0.9";       // red flash on taking a hit
      if (state.shields <= 0) gameOver();
    }
  }

  // debris
  for (let i = debris.length - 1; i >= 0; i--) {
    const d = debris[i];
    d.position.add(d.userData.vel);
    d.userData.vel.multiplyScalar(0.98);
    d.rotation.x += d.userData.spin.x;
    d.rotation.y += d.userData.spin.y;
    d.userData.life -= dt;
    if (d.userData.life <= 0) { scene.remove(d); debris.splice(i, 1); }
  }

  // explosion flashes (expand + fade)
  for (let i = flashes.length - 1; i >= 0; i--) {
    const f = flashes[i];
    f.userData.life -= dt;
    const k = 1 - Math.max(0, f.userData.life) / f.userData.maxLife;
    f.scale.setScalar(1 + k * f.userData.grow);
    f.material.opacity = 0.95 * (1 - k);
    if (f.userData.life <= 0) { scene.remove(f); flashes.splice(i, 1); }
  }

  // EMP shockwave rings (sweep outward down the trench + fade)
  for (let i = empWaves.length - 1; i >= 0; i--) {
    const w = empWaves[i];
    w.userData.life -= dt;
    const k = 1 - Math.max(0, w.userData.life) / w.userData.maxLife;
    w.scale.setScalar(1 + k * 45);
    w.position.z -= dt * 30;
    w.material.opacity = 0.95 * (1 - k);
    if (w.userData.life <= 0) { scene.remove(w); empWaves.splice(i, 1); }
  }

  // camera follow
  camera.position.x = THREE.MathUtils.lerp(camera.position.x, xwing.position.x * 0.6, 0.1);
  camera.position.y = THREE.MathUtils.lerp(camera.position.y, xwing.position.y * 0.6 + 3.0, 0.1);
  camera.position.z = THREE.MathUtils.lerp(camera.position.z, xwing.position.z + 9, 0.1);
  camera.lookAt(xwing.position.x * 0.4, xwing.position.y * 0.4, xwing.position.z - 16);
  // screen shake - jitter the view (rotation only, so it never corrupts the position lerp)
  if (state.camShake > 0.001) {
    const s = state.camShake;
    camera.rotation.z += (Math.random() - 0.5) * s * 0.07;
    camera.rotation.x += (Math.random() - 0.5) * s * 0.05;
    camera.rotation.y += (Math.random() - 0.5) * s * 0.05;
    state.camShake *= 0.86;
  }

  updateReticle();
  setHUD();
}

// ---------- leaderboard (localStorage) ----------
const LB_KEY = "womprat_lb";
function loadLB() { try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch (e) { return []; } }
function lbHTML(list, hi) {
  if (!list.length) return '<div class="lb"><div class="row">NO SCORES YET</div></div>';
  let rows = "";
  list.forEach((e, i) => {
    rows += '<div class="row' + (e === hi ? " me" : "") + '"><span>' + (i + 1) + '. ' + e.name + '</span><span>' + e.score + '</span></div>';
  });
  return '<div class="lb">' + rows + '</div>';
}
function submitScore(name, score) {
  const lb = loadLB();
  const entry = { name, score };
  lb.push(entry);
  lb.sort((a, b) => b.score - a.score);
  const top = lb.slice(0, 10);
  try { localStorage.setItem(LB_KEY, JSON.stringify(top)); } catch (e) {}
  state.entering = false;
  const c = document.getElementById("center");
  c.innerHTML = '<h1>DESTROYED</h1><p>SCORE ' + score + '</p>' + lbHTML(top, entry) +
    '<p class="blink" style="margin-top:14px">PRESS SPACE TO RETRY</p>';
}

function gameOver() {
  if (!state.alive) return;
  state.alive = false;
  state.entering = true;
  explode(xwing.position, 0xff3344, 48);
  sfxExplosion(true);
  setTimeout(sfxR2Sad, 350);   // R2's mournful warble after the boom
  if (engine && actx) engine.g.gain.linearRampToValueAtTime(0.0001, actx.currentTime + 0.4);  // engine dies
  stopMusic();
  xwing.visible = false;
  dmgFlash.style.opacity = "0";   // clear the red damage border on death
  bossEl.classList.add("hidden"); // drop the boss readouts if we died mid-duel
  bobaEl.classList.add("hidden");
  bannerEl.style.opacity = "0";
  bossDimEl.style.opacity = "0";
  const score = state.score;
  const c = document.getElementById("center");
  c.innerHTML = '<h1>DESTROYED</h1><p>SCORE ' + score + '</p><p>DISTANCE ' + (state.dist | 0) + ' M</p>' +
    '<p style="margin-top:12px">ENTER NAME</p>' +
    '<input id="nameInput" maxlength="8" autocomplete="off" spellcheck="false">' +
    '<p style="font-size:13px;opacity:0.8;margin:4px 0 0">PRESS ENTER TO SAVE</p>' +
    lbHTML(loadLB(), null);
  c.classList.remove("hidden");
  const inp = document.getElementById("nameInput");
  setTimeout(() => inp.focus(), 40);
  inp.addEventListener("keydown", (e) => {
    e.stopPropagation();                       // typing must not trigger game controls
    if (e.key === "Enter") submitScore((inp.value.trim() || "LUKE").toUpperCase().slice(0, 8), score);
  });
}

function loop() {
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  updateSkyBattle(dt);     // background dogfight runs always
  updateCameos(dt);        // joke fly-bys finish crossing even on menus
  updateMusic();           // schedule the next slice of the music bed
  composer.render();
  requestAnimationFrame(loop);
}
loop();
</script>
